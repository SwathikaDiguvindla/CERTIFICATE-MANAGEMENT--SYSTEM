<!DOCTYPE html>
<html>
<head>
  <title>CV Portal - Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { display: flex; min-height: 100vh; background: #f4f6f9; }
    .sidebar { width: 200px; background: #1a3a5c; min-height: 100vh; padding: 20px 0; }
    .logo { color: white; font-size: 15px; font-weight: 500; padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.15); }
    .logo span { font-size: 11px; color: rgba(255,255,255,0.6); display: block; margin-top: 2px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; color: rgba(255,255,255,0.75); font-size: 13px; cursor: pointer; text-decoration: none; }
    .nav-item.active { background: #2980b9; color: white; border-left: 3px solid #5dade2; }
    .main { flex: 1; padding: 24px; }
    .page-title { font-size: 20px; font-weight: 500; color: #1a3a5c; margin-bottom: 4px; }
    .page-sub { font-size: 13px; color: #888; margin-bottom: 24px; }
    .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat { background: white; border-radius: 8px; padding: 20px; text-align: center; border: 1px solid #e0e0e0; }
    .stat-num { font-size: 28px; font-weight: 600; color: #1a3a5c; }
    .stat-label { font-size: 12px; color: #888; margin-top: 4px; }
    .card { background: white; border-radius: 8px; padding: 20px; border: 1px solid #e0e0e0; }
    .card-title { font-size: 14px; font-weight: 500; color: #1a3a5c; margin-bottom: 12px; }
    .btn { background: #2980b9; color: white; border: none; padding: 9px 18px; border-radius: 6px; font-size: 13px; cursor: pointer; margin-right: 8px; }
    .btn-green { background: #17a589; }
    .logout { margin-top: auto; }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo">CV Portal <span>Admin Panel</span></div>
    <a class="nav-item active" href="/dashboard/">🏠 Dashboard</a>
    <a class="nav-item" href="#">📄 Generate Cert</a>
    <a class="nav-item" href="#">📤 Bulk Upload</a>
    <a class="nav-item" href="#">🔲 Verify Cert</a>
    <a class="nav-item" href="/logout/" style="margin-top: 40px;">🚪 Logout</a>
  </div>
  <div class="main">
    <div class="page-title">Dashboard</div>
    <div class="page-sub">Welcome back, {{ user.username }}</div>
    <div class="stat-row">
      <div class="stat"><div class="stat-num">128</div><div class="stat-label">Total Certificates</div></div>
      <div class="stat"><div class="stat-num">12</div><div class="stat-label">Generated Today</div></div>
      <div class="stat"><div class="stat-num">98%</div><div class="stat-label">Emails Sent</div></div>
    </div>
    <div class="card">
      <div class="card-title">Quick Actions</div>
      <button class="btn">➕ New Certificate</button>
      <button class="btn btn-green">📤 Upload Excel</button>
    </div>
  </div>
</body>
</html>
