<!DOCTYPE html>
<html>
<head>
  <title>CV Portal - Forgot Password</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { display: flex; min-height: 100vh; }
    .left { width: 45%; background: #1a3a5c; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .shield { width: 70px; height: 70px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; font-size: 32px; }
    .left h1 { color: white; font-size: 22px; }
    .left p { color: rgba(255,255,255,0.65); font-size: 13px; margin-top: 6px; }
    .right { width: 55%; background: white; display: flex; flex-direction: column; justify-content: center; padding: 60px 50px; }
    .right h2 { font-size: 20px; color: #1a3a5c; margin-bottom: 4px; }
    .right p { font-size: 13px; color: #888; margin-bottom: 24px; }
    label { font-size: 12px; color: #555; display: block; margin-bottom: 4px; }
    input { width: 100%; border: 1px solid #ddd; border-radius: 6px; padding: 10px 12px; font-size: 13px; margin-bottom: 16px; }
    button { width: 100%; background: #2980b9; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 15px; cursor: pointer; }
    .error { background: #fdecea; color: #c0392b; padding: 10px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; }
    .success { background: #eafaf1; color: #1e8449; padding: 10px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; }
    .back { display: block; text-align: center; margin-top: 16px; font-size: 13px; color: #2980b9; text-decoration: none; }
  </style>
</head>
<body>
  <div class="left">
    <div class="shield">🛡️</div>
    <h1>CV Portal</h1>
    <p>Certificate Verification System</p>
  </div>
  <div class="right">
    <h2>Forgot Password</h2>
    <p>Enter your email to receive a password reset link</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    {% if message %}<div class="success">{{ message }}</div>{% endif %}
    <form method="POST">
      {% csrf_token %}
      <label>Email Address</label>
      <input type="email" name="email" placeholder="Enter your email" required />
      <button type="submit">Send Reset Link</button>
    </form>
    <a class="back" href="/login/">← Back to Login</a>
  </div>
</body>
</html>
