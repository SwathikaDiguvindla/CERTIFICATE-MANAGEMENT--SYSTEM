<!DOCTYPE html>
<html>
<head>
    <title>Add Member</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            margin:0;
            padding:40px;
        }

        .container{
            width:500px;
            margin:auto;
            background:#fff;
            padding:25px;
            border-radius:8px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        h2{
            color:#1a3a5c;
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-top:15px;
            margin-bottom:5px;
            font-weight:bold;
        }

        input,select{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:14px;
        }

        .btn{
            margin-top:20px;
            background:#2980b9;
            color:white;
            border:none;
            padding:12px;
            width:100%;
            border-radius:5px;
            cursor:pointer;
            font-size:15px;
        }

        .btn:hover{
            background:#21618c;
        }

        .error{
            color:red;
            margin-bottom:15px;
        }

        .success{
            color:green;
            margin-bottom:15px;
        }

        .back{
            display:inline-block;
            margin-top:15px;
            text-decoration:none;
            color:#2980b9;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>Add Member</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    {% if success %}
        <p class="success">{{ success }}</p>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <label>Username</label>
        <input type="text" name="username" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Password</label>
        <input type="password" name="password1" required>

        <label>Confirm Password</label>
        <input type="password" name="password2" required>

        <label>Role</label>

        <select name="role">
            <option value="Staff">Staff</option>
            <option value="Admin">Admin</option>
            <option value="Student">Student</option>
        </select>

        <button type="submit" class="btn">
            Create Member
        </button>

    </form>

    <a href="{% url 'dashboard' %}" class="back">
        ← Back to Dashboard
    </a>

</div>

</body>
</html>
