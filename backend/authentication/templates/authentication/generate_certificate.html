```html
<!DOCTYPE html>
<html>
<head>
    <title>Generate Certificate</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
            margin:0;
            font-family:Arial,sans-serif;
        }

        .sidebar{
            width:220px;
            background:#1a3a5c;
            min-height:100vh;
            position:fixed;
            left:0;
            top:0;
        }

        .logo{
            color:white;
            padding:20px;
            font-size:18px;
            font-weight:bold;
            border-bottom:1px solid rgba(255,255,255,.15);
        }

        .nav-item{
            display:block;
            color:white;
            text-decoration:none;
            padding:12px 20px;
        }

        .nav-item:hover{
            background:#2980b9;
        }

        .main{
            margin-left:220px;
            padding:30px;
        }

        .card{
            border:none;
            border-radius:10px;
            box-shadow:0 2px 10px rgba(0,0,0,.08);
        }

        .btn-primary{
            background:#2980b9;
            border:none;
        }
    </style>
</head>

<body>

<div class="sidebar">

    <div class="logo">
        CV Portal
    </div>

    <a href="/dashboard/" class="nav-item">🏠 Dashboard</a>

    <a href="/generate-certificate/" class="nav-item">
        📄 Generate Certificate
    </a>

    <a href="{% url 'bulk_upload' %}" class="nav-item">
    📤 Bulk Upload
    </a>

    <a href="/logout/" class="nav-item">
        🚪 Logout
    </a>

</div>

<div class="main">

    <h2>Generate Certificate</h2>
    <p class="text-muted">
        Create a certificate for a student
    </p>

    <div class="card p-4">

        <form method="POST">
            {% csrf_token %}

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label>Name</label>
                    <input type="text"
                           name="name"
                           class="form-control"
                           required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Phone Number</label>
                    <input type="text"
                           name="phone"
                           class="form-control"
                           required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Email</label>
                    <input type="email"
                           name="email"
                           class="form-control"
                           required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Domain</label>
                    <input type="text"
                           name="domain"
                           class="form-control"
                           required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Start Date</label>
                    <input type="date"
                           name="start_date"
                           class="form-control"
                           required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>End Date</label>
                    <input type="date"
                           name="end_date"
                           class="form-control"
                           required>
                </div>

            </div>

            <button type="submit"
                    class="btn btn-primary">
                Generate Certificate
            </button>

        </form>

    </div>

</div>

</body>
</html>
```
